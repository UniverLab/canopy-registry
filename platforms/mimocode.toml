name = "mimocode"
config_path = ".claude.json"
mcp_servers_key = ["mcpServers"]
deprecated_keys = []
unsupported_keys = ["autoApprove", "disabled", "tools"]
skills_dir = ".agents/skills"
instruction_file = "AGENTS.md"

[fields_mapping]
env = "environment"

[required_fields]
type = ["stdio", "http"]

[server_extras.canopy]
enabled = true

[server_extras.filesystem]
enabled = true

[server_extras.fetch]
enabled = true

[cli]
binary = "mimo"
headless_mode = "run --dangerously-skip-permissions"
interactive_args = ""
model_flag = "-m"
supports_working_dir = false
accent_color = [251, 129, 71]
resume_args = "--continue"
session_list_cmd = "session list"
session_resume_cmd = "--session"
# List-after-run session id capture (RS1 phase 2). mimo shares opencode's
# session surface. Verified 2026-07-17:
#   $ mimo session list --format json
#   [ { "id": "ses_093945560ffe4rr57EbO7cM1TH", "title": "...", ... }, ... ]
session_list_format_args = "--format json"
session_id_pattern = '"id"\s*:\s*"([^"]+)"'

