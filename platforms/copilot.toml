name = "copilot"
config_path = ".copilot/mcp-config.json"
mcp_servers_key = ["mcpServers"]
deprecated_keys = ["task-trigger"]
unsupported_keys = ["headers"]
skills_dir = ".agents/skills"
instruction_file = ".github/copilot-instructions.md"

[required_fields]
type = ["stdio", "local"]

[server_extras.canopy]
tools = ["*"]

[server_extras.filesystem]
tools = ["*"]

[server_extras.fetch]
tools = ["*"]

[cli]
binary = "copilot"
headless_mode = "-p"
interactive_args = ""
model_flag = "--model"
supports_working_dir = false
yolo_flag = "--allow-all-tools"
accent_color = [170, 0, 170]
resume_args = "--continue"
session_id_set_flag = "--session-id"
