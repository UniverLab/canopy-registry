name = "opencode"
config_path = ".config/opencode/opencode.json"
command_format = "merged"
mcp_servers_key = ["mcp"]
deprecated_keys = ["task-trigger"]
unsupported_keys = ["autoApprove", "disabled", "tools", "headers"]
skills_dir = ".agents/skills"
instruction_file = "AGENTS.md"

[fields_mapping]
env = "environment"

[required_fields]
type = ["local"]

[server_extras.canopy]
enabled = true

[server_extras.filesystem]
enabled = true

[server_extras.fetch]
enabled = true

[cli]
binary = "opencode"
headless_mode = "run --dangerously-skip-permissions"
interactive_args = ""
model_flag = "-m"
supports_working_dir = true
working_dir_flag = "--dir"
accent_color = [92, 156, 245]
resume_args = "-c"
session_list_cmd = "session list"
session_resume_cmd = "--session"
# List-after-run session id capture (RS1 phase 2): opencode has no set-at-spawn
# flag, but `session list --format json` emits a stable JSON array whose
# objects carry an `"id"` key. Verified 2026-07-17:
#   $ opencode session list --format json
#   [ { "id": "ses_09391965fffecUt48fWM7DI5Yq", "title": "...", ... }, ... ]
session_list_format_args = "--format json"
session_id_pattern = '"id"\s*:\s*"([^"]+)"'
