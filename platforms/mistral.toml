name = "mistral"
config_path = ".vibe/config.toml"
config_format = "toml"
toml_array_format = true
mcp_servers_key = ["mcp_servers"]
deprecated_keys = []
unsupported_keys = []
skills_dir = ".vibe/skills"

[fields_mapping]
type = "transport"

[required_fields]
transport = ["http", "stdio"]

[cli]
binary = "vibe"
headless_mode = "-p"
interactive_args = ""
model_flag = "--agent"
supports_working_dir = true
working_dir_flag = "--workdir"
yolo_flag = "--agent auto-approve"
accent_color = [251, 133, 1]
resume_args = "-c"
