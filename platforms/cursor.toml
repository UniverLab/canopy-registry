name = "cursor"
config_path = ".cursor/settings.json"
mcp_servers_key = ["mcpServers"]
deprecated_keys = []
unsupported_keys = ["autoApprove", "disabled", "tools", "headers"]
skills_dir = ".agents/skills"
instruction_file = ".cursor/rules"

[fields_mapping]
env = "environment"

[required_fields]
type = ["stdio", "local"]

[server_extras.canopy]
enabled = true

[server_extras.filesystem]
enabled = true

[server_extras.fetch]
enabled = true

[cli]
binary = "agent"
headless_mode = "-p"
interactive_args = ""
model_flag = "--model"
supports_working_dir = true
working_dir_flag = "--workspace"
yolo_flag = "--yolo"
accent_color = [0, 150, 136]
resume_args = "--continue"
session_list_cmd = ""
session_resume_cmd = "--resume"
