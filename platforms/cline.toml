name = "cline"
config_path = ".cline/data/settings/cline_mcp_settings.json"
command_format = "merged"
mcp_servers_key = ["mcpServers"]
deprecated_keys = []
unsupported_keys = ["autoApprove", "disabled", "tools", "headers"]
skills_dir = ".agents/skills"
instruction_file = ".clinerules"

[fields_mapping]
env = "environment"

[required_fields]
type = ["stdio", "local"]

[server_extras.canopy]
enabled = true

[server_extras.filesystem]
enabled = true

[server_extras.fetch]
enabled = true

[cli]
binary = "cline"
headless_mode = "-a"
interactive_args = ""
model_flag = "-m"
supports_working_dir = true
working_dir_flag = "-c"
yolo_flag = "--yolo"
accent_color = [0, 122, 255]
resume_args = ""
session_list_cmd = "history"
session_resume_cmd = "--id"
