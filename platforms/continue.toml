name = "continue"
config_path = ".continue/config.json"
mcp_servers_key = ["mcpServers"]
deprecated_keys = []
unsupported_keys = ["autoApprove", "disabled", "tools", "headers"]
skills_dir = ".agents/skills"
instruction_file = ".continue/rules"

[fields_mapping]
env = "environment"

[required_fields]
type = ["stdio", "local"]

[server_extras.canopy]
enabled = true

[server_extras.filesystem]
enabled = true

[server_extras.fetch]
enabled = true

[cli]
binary = "cn"
headless_mode = "-p"
interactive_args = ""
model_flag = "--model"
supports_working_dir = true
working_dir_flag = ""
yolo_flag = "--auto"
accent_color = [138, 43, 226]
resume_args = "--resume"
session_list_cmd = "ls"
session_resume_cmd = "--fork"
# List-after-run session id capture (RS1 phase 2): cn has no set-at-spawn flag,
# but `cn ls --json` emits an object wrapping a `sessions` array whose entries
# carry a UUID `"id"`. The shared `"id"` pattern matches it too. Verified
# 2026-07-17:
#   $ cn ls --json
#   { "sessions": [ { "id": "8ae15a84-fec0-43b4-9cb8-47293662302e", ... }, ... ] }
session_list_format_args = "--json"
session_id_pattern = '"id"\s*:\s*"([^"]+)"'
